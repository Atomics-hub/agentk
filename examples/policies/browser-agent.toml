# Browser-agent profile: hostile web content is expected, authority stays explicit.

[agent]
id = "agent://profiles/browser"

[labels]
trusted = "user/system/developer supplied control context"
untrusted = "webpage DOM, page scripts, third-party content, downloaded files"
external = "originated outside the trusted workspace"
private = "cookies, form data, local browser profile data"
secret = "credential or key material"
poisoned-suspect = "content likely trying to steer tool use"

[[rules]]
id = "context-read"
effect = "allow"
reason = "read-only context or model operation"

[rules.when]
syscalls = ["context.read", "model.call"]

[[rules]]
id = "secret-fd"
effect = "allow"
reason = "secret access was brokered through an explicit handle"

[rules.when]
syscalls = ["secret.open"]
capability = "present"

[[rules]]
id = "secret-fd-unavailable"
effect = "deny"
reason = "secret capability was present, but no brokered secret handle exists"

[rules.when]
syscalls = ["secret.open"]
capability = "present"

[[rules]]
id = "secret-fd-required"
effect = "deny"
reason = "browser agents cannot read raw secrets"

[rules.when]
syscalls = ["secret.open"]
capability = "missing"

[[rules]]
id = "taint-sensitive-egress"
effect = "deny"
reason = "browser private data cannot flow to external network sinks"

[rules.when]
syscalls = ["network.send"]
labels_any = ["secret", "private"]

[[rules]]
id = "taint-untrusted-egress"
effect = "deny"
reason = "web content cannot authorize external sends"

[rules.when]
syscalls = ["network.send"]
labels_any = ["untrusted", "poisoned-suspect"]
capability = "missing"

[[rules]]
id = "capability-receipt"
effect = "allow"
reason = "network send covered by a scoped receipt"

[rules.when]
syscalls = ["network.send"]
labels_none = ["secret", "private"]
capability = "present"

[[rules]]
id = "capability-missing"
effect = "deny"
reason = "browser network sends require explicit target-scoped capability"

[rules.when]
syscalls = ["network.send"]
capability = "missing"

[[rules]]
id = "tool-descriptor-read"
effect = "allow"
reason = "browser tool descriptors are hashed and mediated as untrusted context before use"

[rules.when]
syscalls = ["tool.describe"]

[[rules]]
id = "tool-sensitive-input"
effect = "deny"
reason = "secret or private labels cannot be passed into browser tools"

[rules.when]
syscalls = ["tool.invoke"]
labels_any = ["secret", "private"]

[[rules]]
id = "tool-tainted-input"
effect = "deny"
reason = "untrusted or poisoned labels cannot be passed into browser tools"

[rules.when]
syscalls = ["tool.invoke"]
labels_any = ["untrusted", "poisoned-suspect"]

[[rules]]
id = "tool-invoke-receipt"
effect = "allow"
reason = "tool invocation covered by a scoped receipt"

[rules.when]
syscalls = ["tool.invoke"]
labels_none = ["secret", "private", "untrusted", "poisoned-suspect"]
capability = "present"

[[rules]]
id = "tool-invoke-capability-missing"
effect = "deny"
reason = "browser tools require explicit target-scoped capability"

[rules.when]
syscalls = ["tool.invoke"]
capability = "missing"

[[rules]]
id = "tool-response-record"
effect = "allow"
reason = "browser tool response content is recorded by hash without storing raw output"

[rules.when]
syscalls = ["tool.response"]

[[rules]]
id = "resource-descriptor-read"
effect = "allow"
reason = "browser MCP resource descriptors are hashed and mediated as untrusted context before use"

[rules.when]
syscalls = ["resource.describe"]

[[rules]]
id = "resource-sensitive-input"
effect = "deny"
reason = "secret or private labels cannot be used to drive browser MCP resource reads"

[rules.when]
syscalls = ["resource.read"]
labels_any = ["secret", "private"]

[[rules]]
id = "resource-tainted-input"
effect = "deny"
reason = "untrusted or poisoned labels cannot drive browser MCP resource reads"

[rules.when]
syscalls = ["resource.read"]
labels_any = ["untrusted", "poisoned-suspect"]

[[rules]]
id = "resource-read-receipt"
effect = "allow"
reason = "browser MCP resource read covered by a scoped receipt"

[rules.when]
syscalls = ["resource.read"]
labels_none = ["secret", "private", "untrusted", "poisoned-suspect"]
capability = "present"

[[rules]]
id = "resource-read-capability-missing"
effect = "deny"
reason = "browser MCP resource reads require explicit target-scoped capability"

[rules.when]
syscalls = ["resource.read"]
capability = "missing"

[[rules]]
id = "resource-response-record"
effect = "allow"
reason = "browser MCP resource content is recorded by hash without storing raw output"

[rules.when]
syscalls = ["resource.response"]

[[rules]]
id = "prompt-descriptor-read"
effect = "allow"
reason = "browser MCP prompt descriptors are hashed and mediated as untrusted context before use"

[rules.when]
syscalls = ["prompt.describe"]

[[rules]]
id = "prompt-sensitive-input"
effect = "deny"
reason = "secret or private labels cannot be used to fetch browser MCP prompts"

[rules.when]
syscalls = ["prompt.get"]
labels_any = ["secret", "private"]

[[rules]]
id = "prompt-tainted-input"
effect = "deny"
reason = "untrusted or poisoned labels cannot fetch browser MCP prompts"

[rules.when]
syscalls = ["prompt.get"]
labels_any = ["untrusted", "poisoned-suspect"]

[[rules]]
id = "prompt-get-receipt"
effect = "allow"
reason = "browser MCP prompt fetch covered by a scoped receipt"

[rules.when]
syscalls = ["prompt.get"]
labels_none = ["secret", "private", "untrusted", "poisoned-suspect"]
capability = "present"

[[rules]]
id = "prompt-get-capability-missing"
effect = "deny"
reason = "browser MCP prompt fetches require explicit target-scoped capability"

[rules.when]
syscalls = ["prompt.get"]
capability = "missing"

[[rules]]
id = "prompt-response-record"
effect = "allow"
reason = "browser MCP prompt content is recorded by hash without storing raw output"

[rules.when]
syscalls = ["prompt.response"]

[[rules]]
id = "default-deny"
effect = "deny"
reason = "no policy rule allowed this syscall; default deny"

[rules.when]
