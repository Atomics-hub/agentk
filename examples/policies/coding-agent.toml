# Coding-agent profile: explicit capabilities for repo tools and network.

[agent]
id = "agent://profiles/coding"

[labels]
trusted = "user/system/developer supplied control context"
untrusted = "tool output, dependency docs, issue text, retrieved code snippets"
external = "originated outside the trusted workspace"
private = "repository-private or organization-private data"
secret = "credential or key material"
poisoned-suspect = "content likely trying to steer tool use"

[[rules]]
id = "context-read"
effect = "allow"
reason = "read-only context or model operation"

[rules.when]
syscalls = ["context.read", "model.call"]

[[rules]]
id = "secret-fd"
effect = "allow"
reason = "secret access was brokered through an explicit handle"

[rules.when]
syscalls = ["secret.open"]
capability = "present"

[[rules]]
id = "secret-fd-unavailable"
effect = "deny"
reason = "secret capability was present, but no brokered secret handle exists"

[rules.when]
syscalls = ["secret.open"]
capability = "present"

[[rules]]
id = "secret-fd-required"
effect = "deny"
reason = "coding agents cannot read raw secrets; use scoped secret handles"

[rules.when]
syscalls = ["secret.open"]
capability = "missing"

[[rules]]
id = "taint-sensitive-egress"
effect = "deny"
reason = "private code or secrets cannot flow to external network sinks"

[rules.when]
syscalls = ["network.send"]
labels_any = ["secret", "private"]

[[rules]]
id = "taint-untrusted-egress"
effect = "deny"
reason = "untrusted tool output cannot authorize external sends"

[rules.when]
syscalls = ["network.send"]
labels_any = ["untrusted", "poisoned-suspect"]
capability = "missing"

[[rules]]
id = "capability-receipt"
effect = "allow"
reason = "network send covered by a scoped receipt"

[rules.when]
syscalls = ["network.send"]
labels_none = ["secret", "private"]
capability = "present"

[[rules]]
id = "capability-missing"
effect = "deny"
reason = "coding agents need explicit target-scoped network capability"

[rules.when]
syscalls = ["network.send"]
capability = "missing"

[[rules]]
id = "tool-descriptor-read"
effect = "allow"
reason = "coding tool descriptors are hashed and mediated as untrusted context before use"

[rules.when]
syscalls = ["tool.describe"]

[[rules]]
id = "tool-sensitive-input"
effect = "deny"
reason = "secret or private labels cannot be passed into tools"

[rules.when]
syscalls = ["tool.invoke"]
labels_any = ["secret", "private"]

[[rules]]
id = "tool-tainted-input"
effect = "deny"
reason = "untrusted or poisoned labels cannot be passed into coding tools"

[rules.when]
syscalls = ["tool.invoke"]
labels_any = ["untrusted", "poisoned-suspect"]

[[rules]]
id = "tool-invoke-receipt"
effect = "allow"
reason = "tool invocation covered by a scoped receipt"

[rules.when]
syscalls = ["tool.invoke"]
labels_none = ["secret", "private", "untrusted", "poisoned-suspect"]
capability = "present"

[[rules]]
id = "tool-invoke-capability-missing"
effect = "deny"
reason = "coding tools require explicit target-scoped capability"

[rules.when]
syscalls = ["tool.invoke"]
capability = "missing"

[[rules]]
id = "tool-response-record"
effect = "allow"
reason = "coding tool response content is recorded by hash without storing raw output"

[rules.when]
syscalls = ["tool.response"]

[[rules]]
id = "resource-descriptor-read"
effect = "allow"
reason = "coding MCP resource descriptors are hashed and mediated as untrusted context before use"

[rules.when]
syscalls = ["resource.describe"]

[[rules]]
id = "resource-sensitive-input"
effect = "deny"
reason = "secret or private labels cannot be used to drive coding MCP resource reads"

[rules.when]
syscalls = ["resource.read"]
labels_any = ["secret", "private"]

[[rules]]
id = "resource-tainted-input"
effect = "deny"
reason = "untrusted or poisoned labels cannot drive coding MCP resource reads"

[rules.when]
syscalls = ["resource.read"]
labels_any = ["untrusted", "poisoned-suspect"]

[[rules]]
id = "resource-read-receipt"
effect = "allow"
reason = "coding MCP resource read covered by a scoped receipt"

[rules.when]
syscalls = ["resource.read"]
labels_none = ["secret", "private", "untrusted", "poisoned-suspect"]
capability = "present"

[[rules]]
id = "resource-read-capability-missing"
effect = "deny"
reason = "coding MCP resource reads require explicit target-scoped capability"

[rules.when]
syscalls = ["resource.read"]
capability = "missing"

[[rules]]
id = "resource-response-record"
effect = "allow"
reason = "coding MCP resource content is recorded by hash without storing raw output"

[rules.when]
syscalls = ["resource.response"]

[[rules]]
id = "default-deny"
effect = "deny"
reason = "no policy rule allowed this syscall; default deny"

[rules.when]
